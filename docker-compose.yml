services:
    # ── Valkey ────────────────────────────────────────────────────
    valkey:
        image: valkey/valkey:latest
        ports:
            - "6379:6379"
        # Valkey nutzt dieselben Parameter wie Redis
        command: [ "valkey-server", "--appendonly", "yes" ]
        healthcheck:
            # Hier nutzen wir valkey-cli statt redis-cli
            test: [ "CMD", "valkey-cli", "ping" ]
            interval: 5s
            timeout: 3s
            retries: 5
        volumes:
            - valkey_data:/data
        networks:
            - asynq-net

    # ── Worker Pods (4 identical containers) ─────────────────────
    worker-1:
        build: .
        command: [ "worker" ]
        environment:
            - POD_ID=worker-1
            - ASYNQ_REDIS_ADDR=valkey:6379
        depends_on:
            valkey:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - asynq-net

    worker-2:
        build: .
        command: [ "worker" ]
        environment:
            - POD_ID=worker-2
            - ASYNQ_REDIS_ADDR=valkey:6379
        depends_on:
            valkey:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - asynq-net

    worker-3:
        build: .
        command: [ "worker" ]
        environment:
            - POD_ID=worker-3
            - ASYNQ_REDIS_ADDR=valkey:6379
        depends_on:
            valkey:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - asynq-net

    worker-4:
        build: .
        command: [ "worker" ]
        environment:
            - POD_ID=worker-4
            - ASYNQ_REDIS_ADDR=valkey:6379
        depends_on:
            valkey:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - asynq-net

    # ── Web UI + Embedded Asynqmon ───────────────────────────────
    web:
        build: .
        command: [ "web" ]
        ports:
            - "8888:8888"
        environment:
            - POD_ID=web
            - ASYNQ_REDIS_ADDR=valkey:6379
            - ASYNQ_WEB_PORT=8888
        depends_on:
            valkey:
                condition: service_healthy
        restart: unless-stopped
        networks:
            - asynq-net

networks:
    asynq-net:
        driver: bridge

volumes:
    valkey_data:
